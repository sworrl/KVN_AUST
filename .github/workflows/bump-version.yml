name: Bump app-version-data on release

on:
  release:
    types: [published]

# This workflow needs to push a commit back to main, so contents:write
# is required. The default GITHUB_TOKEN doesn't trigger downstream
# workflows on push (which is what we want — no infinite tag loop).
permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Parse tag and bump embedded version
        id: bump
        # Pass the release body via env (NOT inline ${{ ... }} substitution)
        # so backticks / quotes / shell metacharacters in the markdown body
        # can't break out of the script. This is the GHA-recommended safe
        # pattern for untrusted user-supplied input.
        env:
          RELEASE_TAG:  ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # Strip leading 'v' (e.g. v7.0.1 → 7.0.1) and reject anything
          # that doesn't look like a SemVer triple. Refuse pre-release tags
          # like v7.0.1-rc1 — those shouldn't bump the production app
          # version that the wrapper compares against.
          VER="${RELEASE_TAG#v}"
          if ! [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$RELEASE_TAG' doesn't look like a release SemVer triple — skipping bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUILD="$(date -u '+%Y-%m-%dT%H:%M:%S')"

          # All parsing happens in Python so we never feed the release body
          # back through a shell. Python reads body from $RELEASE_BODY env.
          python3 - "$VER" "$BUILD" <<'PYEOF'
          import json, os, re, sys
          ver, build = sys.argv[1], sys.argv[2]
          notes = os.environ.get('RELEASE_BODY', '') or ''
          # Pull the first non-empty line of the release body as a one-line
          # changelog summary, stripped of markdown noise. Cap at 280 chars.
          summary = ''
          for line in notes.splitlines():
              cleaned = re.sub(r'^#+\s*', '', line)
              cleaned = re.sub(r'\*\*', '', cleaned)
              cleaned = re.sub(r'\[([^\]]+)\]\([^)]+\)', r'\1', cleaned)
              cleaned = cleaned.replace('`', '').strip()
              if cleaned:
                  summary = cleaned[:280]
                  break
          if not summary:
              summary = f'Release {ver}'

          path = 'kvnaust-recyclebin.html'
          with open(path) as f: html = f.read()
          m = re.search(
              r'(<script type="application/json" id="app-version-data">\s*)({[^<]*?})(\s*</script>)',
              html, re.DOTALL,
          )
          if not m:
              print('FAIL: app-version-data block not found', file=sys.stderr)
              sys.exit(1)
          data = json.loads(m.group(2))
          if data.get('version') == ver:
              print(f'No-op: embedded version already {ver}')
              sys.exit(0)
          old = data.get('version', '?')
          data['version']   = ver
          data['build']     = build
          data['changelog'] = summary
          new_block = m.group(1) + json.dumps(data, indent=2) + m.group(3)
          with open(path, 'w') as f: f.write(html[:m.start()] + new_block + html[m.end():])
          print(f'BUMPED: {old} -> {ver}')
          PYEOF

          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.bump.outputs.skip != 'true' && steps.bump.outputs.ver != ''
        run: |
          if git diff --quiet kvnaust-recyclebin.html; then
            echo "No change to commit (embedded version already at target)."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kvnaust-recyclebin.html
          git commit -m "Auto-bump app-version-data to ${{ steps.bump.outputs.ver }}

          Triggered by GitHub Release publish. Keeps the embedded version
          block in lockstep with the published tag so the in-app version
          pill + the wrapper's version-stream comparison see the same
          number you cut a tag for."
          git push origin main
