name: Update Leaderboard

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch: # Manual trigger

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch leaderboard from API
        run: |
          curl -s "https://www.falcontechnix.com/KVN_AUST/finds.php?limit=25&order=asc" -o /tmp/finds.json

      - name: Generate leaderboard markdown
        run: |
          python3 << 'PYEOF'
          import json, re

          with open('/tmp/finds.json') as f:
              data = json.load(f)

          if not data.get('ok') or not data.get('finds'):
              print("API returned no data")
              exit(0)

          finds = data['finds']
          total = data.get('total', len(finds))
          oldest = data.get('oldest_post_date', '?')
          newest = data.get('newest_post_date', '?')

          rarity_emoji = {
              'LEGENDARY': '🏆',
              'SUPER RARE': '🔴',
              'VERY RARE': '🟠',
              'RARE': '🟢',
              'COMMON': '🔵'
          }

          zero_views = [f for f in finds if (f.get('views_when_found') or 0) == 0]
          has_views = [f for f in finds if (f.get('views_when_found') or 0) > 0]

          lines = []
          lines.append(f'**{total} community finds** — oldest: {oldest} · newest: {newest}')

          # Zero-view finds first (the holy grail)
          if zero_views:
              lines.append('')
              lines.append(f'#### ⭐ Zero-View Finds ({len(zero_views)})')
              lines.append('')
              lines.append('| # | Rarity | Date Posted | Lead | Found By |')
              lines.append('|:-:|:-------|:-----------|:-----|:---------|')
              for i, f in enumerate(zero_views[:25]):
                  medal = '🥇' if i == 0 else '🥈' if i == 1 else '🥉' if i == 2 else str(i+1)
                  emoji = rarity_emoji.get(f.get('rarity', ''), '')
                  date = f.get('date_posted', '?')
                  lead = f.get('lead', '?') or '—'
                  if len(lead) > 25: lead = lead[:22] + '...'
                  found_by = f.get('found_by', '?')
                  rarity = f.get('rarity', '?')
                  vid = f.get('video_id', '')
                  link = f'[{date}](https://youtube.com/watch?v={vid})' if vid else date
                  lines.append(f'| {medal} | {emoji} **{rarity}** | {link} | `{lead}` | **{found_by}** |')

          # Non-zero finds below
          if has_views:
              lines.append('')
              lines.append(f'#### All Finds ({len(has_views)} with views)')
              lines.append('')
              lines.append('| # | Rarity | Date Posted | Views | Lead | Found By |')
              lines.append('|:-:|:-------|:-----------|------:|:-----|:---------|')
              for i, f in enumerate(has_views[:25]):
                  emoji = rarity_emoji.get(f.get('rarity', ''), '')
                  date = f.get('date_posted', '?')
                  views = f.get('views_when_found', '?')
                  lead = f.get('lead', '?') or '—'
                  if len(lead) > 25: lead = lead[:22] + '...'
                  found_by = f.get('found_by', '?')
                  rarity = f.get('rarity', '?')
                  vid = f.get('video_id', '')
                  link = f'[{date}](https://youtube.com/watch?v={vid})' if vid else date
                  lines.append(f'| {i+1} | {emoji} {rarity} | {link} | {views} | `{lead}` | {found_by} |')

          lines.append('')
          lines.append(f'*Live leaderboard at [falcontechnix.com/KVN_AUST/#records](https://falcontechnix.com/KVN_AUST/#records) · [API endpoint](https://www.falcontechnix.com/KVN_AUST/finds.php)*')

          leaderboard = '\n'.join(lines)

          with open('README.md', 'r') as f:
              readme = f.read()

          pattern = r'<!-- LEADERBOARD-START -->.*?<!-- LEADERBOARD-END -->'
          replacement = f'<!-- LEADERBOARD-START -->\n{leaderboard}\n<!-- LEADERBOARD-END -->'
          readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open('README.md', 'w') as f:
              f.write(readme)

          print(f"Updated leaderboard with {len(finds[:25])} entries")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add README.md && git commit -m "Auto-update community leaderboard" && git push)
