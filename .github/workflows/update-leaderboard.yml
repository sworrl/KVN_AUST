name: Update Leaderboard

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch all finds from API
        id: fetch
        env:
          KVN_SYNC_TOKEN: ${{ secrets.KVN_SYNC_TOKEN }}
        run: |
          if curl -sS --fail --retry 5 --retry-delay 10 --retry-all-errors --max-time 30 \
               -H "X-KVN-Sync-Token: $KVN_SYNC_TOKEN" \
               "https://kvnaust.falcontechnix.com/finds.php?limit=500&order=asc" \
               -o /tmp/finds.json \
             && python3 -c "import json,sys; json.load(open('/tmp/finds.json'))"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "API fetch/parse failed — skipping update" >&2
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate RECORDS.md and README sample
        if: steps.fetch.outputs.ok == 'true'
        run: |
          python3 << 'PYEOF'
          import json, re, datetime

          with open('/tmp/finds.json') as f:
              data = json.load(f)

          if not data.get('ok') or not data.get('finds'):
              print("API returned no data")
              exit(0)

          finds  = data['finds']
          total  = data.get('total', len(finds))
          oldest = data.get('oldest_post_date', '?')
          newest = data.get('newest_post_date', '?')
          now    = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')

          RARITY_EMOJI = {
              'LEGENDARY': '🏆', 'SUPER RARE': '🔴',
              'VERY RARE': '🟠', 'RARE': '🟢', 'COMMON': '🔵',
          }
          RARITY_ORDER = ['LEGENDARY','SUPER RARE','VERY RARE','RARE','COMMON']

          def medal(i):
              return ['🥇','🥈','🥉'][i] if i < 3 else str(i + 1)

          def yt_link(f):
              vid = f.get('video_id','')
              date = f.get('date_posted','?')
              return f'[{date}](https://youtube.com/watch?v={vid})' if vid else date

          def trunc(s, n=30):
              s = s or '—'
              return s[:n-1]+'…' if len(s) > n else s

          # ── Rarity counts for stats block ─────────────────────────────────
          rarity_counts = {r: 0 for r in RARITY_ORDER}
          zero_view_count = 0
          for f in finds:
              r = f.get('rarity','')
              if r in rarity_counts:
                  rarity_counts[r] += 1
              if (f.get('views_when_found') or 0) == 0:
                  zero_view_count += 1

          # ── Sort: zero-view first, then by date posted asc ────────────────
          def sort_key(f):
              views = f.get('views_when_found') or 0
              date  = f.get('date_posted') or '9999'
              ri    = RARITY_ORDER.index(f.get('rarity','COMMON')) if f.get('rarity') in RARITY_ORDER else 99
              return (0 if views == 0 else 1, date, ri)

          finds_sorted = sorted(finds, key=sort_key)

          # ════════════════════════════════════════════════════════════════════
          #  RECORDS.md — full record of every find
          # ════════════════════════════════════════════════════════════════════
          lines = []
          lines += [
              '# Community Finds — Complete Record',
              '',
              '> Auto-generated every 30 minutes from the [Community Finds API](https://kvnaust.falcontechnix.com/finds.php). '
              'Do not edit manually — changes will be overwritten.',
              f'> Last updated: **{now}**',
              '',
              '## Stats',
              '',
              f'| Metric | Value |',
              f'|:-------|------:|',
              f'| Total finds | **{total}** |',
              f'| Zero-view finds | **{zero_view_count}** |',
              f'| Oldest posted | **{oldest}** |',
              f'| Newest posted | **{newest}** |',
          ]
          for r in RARITY_ORDER:
              n = rarity_counts[r]
              if n:
                  lines.append(f'| {RARITY_EMOJI[r]} {r} | {n} |')
          lines += ['']

          # Zero-view section
          zero = [f for f in finds_sorted if (f.get('views_when_found') or 0) == 0]
          if zero:
              lines += [
                  f'## ⭐ Zero-View Finds ({len(zero)})',
                  '',
                  '| # | Rarity | Date Posted | Lead | Category | Found By | Source | Discovered |',
                  '|:-:|:-------|:-----------|:-----|:---------|:---------|:-------|:-----------|',
              ]
              for i, f in enumerate(zero):
                  em   = RARITY_EMOJI.get(f.get('rarity',''), '')
                  cat  = f.get('lead_category') or '—'
                  src  = f.get('source') or '—'
                  disc = (f.get('discovered_at') or '')[:10]
                  lines.append(
                      f'| {medal(i)} | {em} **{f.get("rarity","")}** | {yt_link(f)} '
                      f'| `{trunc(f.get("lead",""),28)}` | {cat} '
                      f'| **{f.get("found_by","?")}** | {src} | {disc} |'
                  )
              lines += ['']

          # Full table — all finds
          lines += [
              f'## All Finds ({total})',
              '',
              '| # | Rarity | Date Posted | Views | Lead | Category | Channel | Vids | Found By | Source | Discovered |',
              '|:-:|:-------|:-----------|------:|:-----|:---------|:--------|-----:|:---------|:-------|:-----------|',
          ]
          for i, f in enumerate(finds_sorted):
              em      = RARITY_EMOJI.get(f.get('rarity',''), '')
              views   = f.get('views_when_found')
              views_s = str(views) if views is not None else '?'
              cat     = f.get('lead_category') or '—'
              ch      = trunc(f.get('channel_name') or '?', 20)
              chv     = f.get('channel_videos')
              chv_s   = str(chv) if chv is not None else '?'
              src     = f.get('source') or '—'
              disc    = (f.get('discovered_at') or '')[:10]
              note    = f' _{f["note"]}_' if f.get('note') else ''
              lines.append(
                  f'| {i+1} | {em} {f.get("rarity","")} | {yt_link(f)} | {views_s} '
                  f'| `{trunc(f.get("lead",""),28)}` | {cat} '
                  f'| {ch} | {chv_s} '
                  f'| {f.get("found_by","?")} | {src} | {disc}{note} |'
              )

          lines += [
              '',
              '---',
              '',
              f'*Live leaderboard at [kvnaust.falcontechnix.com/#records](https://kvnaust.falcontechnix.com/#records) '
              f'· [API endpoint](https://kvnaust.falcontechnix.com/finds.php)*',
          ]

          with open('RECORDS.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print(f"RECORDS.md: {len(finds)} finds written")

          # ════════════════════════════════════════════════════════════════════
          #  README sample — top 20 by sort order (zero-view → oldest)
          # ════════════════════════════════════════════════════════════════════
          TOP_N = 20
          sample = finds_sorted[:TOP_N]
          zero_s   = [f for f in sample if (f.get('views_when_found') or 0) == 0]
          viewed_s = [f for f in sample if (f.get('views_when_found') or 0) > 0]

          rb = []
          rb.append(f'**{total} community finds** — oldest: {oldest} · newest: {newest} · [Full record →](RECORDS.md)')

          if zero_s:
              rb += [
                  '',
                  f'#### ⭐ Zero-View Finds ({zero_view_count})',
                  '',
                  '| # | Rarity | Date Posted | Lead | Found By |',
                  '|:-:|:-------|:-----------|:-----|:---------|',
              ]
              for i, f in enumerate(zero_s):
                  em = RARITY_EMOJI.get(f.get('rarity',''), '')
                  lead = trunc(f.get('lead','') or '—', 25)
                  rb.append(f'| {medal(i)} | {em} **{f.get("rarity","")}** | {yt_link(f)} | `{lead}` | **{f.get("found_by","?")}** |')

          if viewed_s:
              rb += [
                  '',
                  f'#### Top Finds by Age ({min(len(viewed_s), TOP_N - len(zero_s))} shown · {total - zero_view_count} total with views)',
                  '',
                  '| # | Rarity | Date Posted | Views | Lead | Found By |',
                  '|:-:|:-------|:-----------|------:|:-----|:---------|',
              ]
              for i, f in enumerate(viewed_s):
                  em    = RARITY_EMOJI.get(f.get('rarity',''), '')
                  views = f.get('views_when_found','?')
                  lead  = trunc(f.get('lead','') or '—', 25)
                  rb.append(f'| {i+1} | {em} {f.get("rarity","")} | {yt_link(f)} | {views} | `{lead}` | {f.get("found_by","?")} |')

          rb += [
              '',
              f'*[See all {total} finds →](RECORDS.md) · Live at [kvnaust.falcontechnix.com/#records](https://kvnaust.falcontechnix.com/#records)*',
          ]

          leaderboard = '\n'.join(rb)

          with open('README.md') as f:
              readme = f.read()

          pattern = r'<!-- LEADERBOARD-START -->.*?<!-- LEADERBOARD-END -->'
          replacement = f'<!-- LEADERBOARD-START -->\n{leaderboard}\n<!-- LEADERBOARD-END -->'
          readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open('README.md', 'w') as f:
              f.write(readme)

          print(f"README.md: top {len(sample)} of {total} finds written")
          PYEOF

      - name: Commit if changed
        if: steps.fetch.outputs.ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (
            git add README.md RECORDS.md &&
            git commit -m "Auto-update leaderboard + RECORDS.md" &&
            git push
          )
